# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.
# This workflow will build a Java project with Gradle and cache/restore any dependencies to improve the workflow execution time
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-java-with-gradle

name: Build Forge Mod

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: false

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Check GeckoLib availability and pre-download
        run: |
          URL="https://dl.cloudsmith.io/public/geckolib3/geckolib/maven/software/bernie/geckolib/geckolib-forge-1.20.1/4.4.4/geckolib-forge-1.20.1-4.4.4.jar"

          # Show Cloudsmith reachability
          CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 "$URL")
          echo "::notice::Cloudsmith HTTP status for GeckoLib 4.4.4 = $CODE"

          # Wipe ALL Gradle module resolution metadata so Gradle re-downloads fresh
          echo "Clearing stale Gradle resolution metadata..."
          rm -rf "$HOME/.gradle/caches/modules-2/metadata-2.100" || true
          rm -rf "$HOME/.gradle/caches/modules-2/files-2.1/software.bernie.geckolib" || true

          # Try to download to local Maven cache as a fallback source
          DIR="$HOME/.m2/repository/software/bernie/geckolib/geckolib-forge-1.20.1/4.4.4"
          mkdir -p "$DIR"
          if [ "$CODE" = "200" ]; then
            for FILE in \
              "geckolib-forge-1.20.1-4.4.4.jar" \
              "geckolib-forge-1.20.1-4.4.4.pom" \
              "geckolib-forge-1.20.1-4.4.4-sources.jar"; do
              curl -fL --retry 3 --max-time 120 \
                "https://dl.cloudsmith.io/public/geckolib3/geckolib/maven/software/bernie/geckolib/geckolib-forge-1.20.1/4.4.4/$FILE" \
                -o "$DIR/$FILE" && echo "Downloaded $FILE" || echo "WARNING: failed $FILE"
            done
            ls -lh "$DIR/"
          else
            echo "Cloudsmith NOT reachable (HTTP $CODE) — build will rely on direct resolution"
          fi

      - name: Build mod
        run: ./gradlew build --stacktrace

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dragonlegacyquesttoast-build
          path: build/libs/*.jar
