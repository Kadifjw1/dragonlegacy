# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.
# This workflow will build a Java project with Gradle and cache/restore any dependencies to improve the workflow execution time
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-java-with-gradle

name: Build Forge Mod

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: false

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Check GeckoLib availability and pre-download
        run: |
          BASE="https://dl.cloudsmith.io/public/geckolib3/geckolib/maven"
          COORD="software/bernie/geckolib/geckolib-forge-1.20.1/4.4.4"
          JAR_URL="$BASE/$COORD/geckolib-forge-1.20.1-4.4.4.jar"

          # Diagnostic: what does Cloudsmith return?
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "$JAR_URL")
          echo "Cloudsmith HTTP status for GeckoLib 4.4.4: $HTTP_CODE"

          # Clear any stale Gradle "not found" cache for GeckoLib
          rm -rf "$HOME/.gradle/caches/modules-2/files-2.1/software.bernie.geckolib" || true
          rm -rf "$HOME/.gradle/caches/modules-2/metadata-2.100/descriptors/software.bernie.geckolib" || true

          # Download to local Maven cache so mavenLocal() serves it
          DIR="$HOME/.m2/repository/$COORD"
          mkdir -p "$DIR"
          for FILE in \
            "geckolib-forge-1.20.1-4.4.4.jar" \
            "geckolib-forge-1.20.1-4.4.4.pom" \
            "geckolib-forge-1.20.1-4.4.4-sources.jar"; do
            curl -fL --retry 5 --retry-delay 5 --max-time 120 \
              "$BASE/$COORD/$FILE" -o "$DIR/$FILE" \
              && echo "Downloaded $FILE" \
              || echo "WARNING: failed to download $FILE (HTTP $HTTP_CODE)"
          done

          # Confirm what landed in local Maven
          ls -lh "$DIR/" 2>/dev/null || echo "Local Maven dir is empty"

      - name: Build mod
        run: ./gradlew build --stacktrace

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dragonlegacyquesttoast-build
          path: build/libs/*.jar
